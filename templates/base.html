<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ get_url(path='favicon.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ get_url(path='favicon-32.png') }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body class="{% block body_class %}{% endblock %}">

  <div class="grain">
    <svg>
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noise)"/>
    </svg>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">On A <span>Tangent</span></a>
      {% block breadcrumb %}{% endblock %}
      <div class="nav-links">
        <a href="/projects/">Projects</a>
        <a href="/people/">People</a>
        <a href="/about/">About</a>
      </div>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="site-footer-brand">
        <p class="site-footer-name">On A Tangent Ltd.</p>
        <p class="site-footer-contact">
          <a href="mailto:on.a.tangent@randomwalks.xyz">on.a.tangent@randomwalks.xyz</a>
        </p>
      </div>
      <div class="site-footer-meta">
        <p><span class="site-footer-key">Registration</span> Registered in England and Wales. Company number: 16746857.</p>
        <p><span class="site-footer-key">Registered office</span> 80 Godstow Road, Oxford, United Kingdom, OX2 8NY.</p>
      </div>
    </div>
  </footer>

  <script>
    document.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.textContent = 'Copied';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        });
      });
      pre.appendChild(btn);
    });
  </script>

</body>
</html>
